<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏡 Fredys Haussuche</title>

  <meta name="theme-color" content="#2f5d50">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🏡 Fredys Haussuche</h1>
    <p>24999 Wees • Umkreis 5 km</p>
</header>

<section class="search">

    <input
        type="text"
        placeholder="Ort"
        value="24999 Wees">

    <input
        type="number"
        placeholder="Radius"
        value="5">

    <input
        type="number"
        placeholder="Mindestens Zimmer"
        value="4">

    <input
        type="number"
        placeholder="Maximale Miete (€)">

    <button>Suchen</button>

</section>

<section class="cards">

    <div class="card">
        <h2>Neue Angebote</h2>
        <p>Noch keine Treffer.</p>
    </div>

    <div class="card">
        <h2>Favoriten</h2>
        <p>0 gespeicherte Häuser</p>
    </div>

    <div class="card">
        <h2>Karte</h2>
        <p>Kommt in Version 2.</p>
    </div>

</section>

<nav>

    <a href="#">🏠</a>

    <a href="#">❤️</a>

    <a href="#">🗺️</a>

    <a href="#">⚙️</a>

</nav>

<script src="app.js"></script>

</body>
</html>
